<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>郑州实时天气</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f7fa;
            color: #333;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .weather-card {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .update-time {
            text-align: right;
            font-size: 0.9em;
            color: #777;
            margin-top: 10px;
        }
        canvas {
            max-height: 400px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>郑州实时天气监控</h1>
    </div>

    <div class="weather-card">
        <h2>{{CITY}}当前天气</h2>
        <div style="font-size: 5em; font-weight: bold;">{{TEMPERATURE}}°C</div>
        <div style="font-size: 1.5em;">{{CONDITION}}</div>
    </div>

    <div class="stats-container">
        <div class="chart-container" style="flex: 1;">
            <h3>24小时温度变化</h3>
            <canvas id="lineChart"></canvas>
        </div>
        <div class="chart-container" style="flex: 1;">
            <h3>温度分布统计</h3>
            <canvas id="barChart"></canvas>
        </div>
    </div>

    <div class="update-time">最后更新时间: {{TIME}}</div>

    <script>
        // 模拟历史数据 (实际应用中应从服务器获取)
        const hours = Array.from({length: 24}, (_, i) => `${i}:00`);
        const temperatures = Array.from({length: 24}, () => 
            Math.floor(Math.random() * 10) + {{TEMPERATURE}} - 5
        );
        
        // 折线图配置
        const lineCtx = document.getElementById('lineChart').getContext('2d');
        new Chart(lineCtx, {
            type: 'line',
            data: {
                labels: hours,
                datasets: [{
                    label: '温度 (°C)',
                    data: temperatures,
                    borderColor: '#2575fc',
                    backgroundColor: 'rgba(37, 117, 252, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: {
                        title: { display: true, text: '温度 (°C)' }
                    }
                }
            }
        });
        
        // 柱状图配置
        const barCtx = document.getElementById('barChart').getContext('2d');
        new Chart(barCtx, {
            type: 'bar',
            data: {
                labels: ['<10°C', '10-20°C', '20-30°C', '>30°C'],
                datasets: [{
                    label: '天数',
                    data: [2, 15, 25, 8],
                    backgroundColor: [
                        '#4bc0c0',
                        '#36a2eb',
                        '#ffcd56',
                        '#ff6384'
                    ]
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        title: { display: true, text: '天数' }
                    }
                }
            }
        });
    </script>
</body>
</html>
